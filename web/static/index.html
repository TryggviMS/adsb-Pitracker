<!DOCTYPE html>
<html lang="is">

<head>
  <meta charset="UTF-8">
  <title>NESFLUG.COM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">

  <!-- Prevent caching -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
</head>

<body>
  <div id="app">

    <header id="header">

      <div class="header-left">
        NESFLUG.COM ✈️ ADS-B merkjamóttaka
      </div>

      <div id="global-stats" class="header-center" aria-label="Tölfræði">
        <span class="stat">Alls: <b id="stat-total">–</b></span>
        <span class="sep">│</span>
        <span class="stat">Í vikunni: <b id="stat-week">–</b></span>
        <span class="sep">│</span>
        <span class="stat">Í dag: <b id="stat-today">–</b></span>
        <span class="sep">│</span>
        <span class="stat">Síðasta klst: <b id="stat-hour">–</b></span>
        <span class="sep">│</span>
        <span class="stat">Síðasta flug: <b id="stat-last">–</b></span>
      </div>

      <div class="header-right">
        <button id="sidebar-toggle" class="icon-btn" type="button" aria-label="Sýna/fela lista">
          ☰
        </button>
        <button id="paths-toggle" class="pill-btn" type="button">
          🕛 Frá miðnætti
        </button>

        <div id="live-status">
          <span class="live-dot"></span>
          <span class="live-text">LIVE</span>
        </div>
      </div>

    </header>

    <main id="main">
      <div id="map"></div>

      <aside id="sidebar">
        <h3 class="sidebar-heading">
          <span id="sidebar-title">Flugvélar undir eftirliti</span>
          <span id="sidebar-count" class="sidebar-count">Fj. í lista: 0</span>
        </h3>
        <ul id="aircraft-list"></ul>
      </aside>
    </main>

<footer id="footer">
  <div class="footer-left">
    Staðsetning móttakara: Álftanes
  </div>

  <!-- Center GitHub link -->
  <div class="footer-center">
    <a href="https://github.com/YOUR_USERNAME/YOUR_REPO"
       target="_blank"
       class="github-link"
       aria-label="GitHub repository"

        0 0 .84-.275 2.75 1.049A9.37 9.37 0 0112 6.844c.85.004 1.705.116 2.505.34

      GitHub
    </a>
  </div>

  <div class="footer-right">
    ADS-B gögn · RTL-SDR 1090 móttakari. Keyrt á Raspberry Pi 4.
  </div>
</footer>

  </div>
  <!-- Aircraft Detail Panel -->
  <div id="detail-panel" class="detail-panel" aria-hidden="true">
    <div class="detail-panel-inner">
      <button id="detail-close" class="detail-close" aria-label="Loka">✕</button>
      <div id="detail-content" class="detail-content">
        <div class="detail-loading">Hleður...</div>
      </div>
    </div>
  </div>
  <div id="detail-backdrop" class="detail-backdrop"></div>
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://rawcdn.githack.com/bbecquet/Leaflet.RotatedMarker/master/leaflet.rotatedMarker.js"></script>
  <script src="map.js"></script>

  <script>
    // Paths toggle: LIVE vs since midnight
    const pathsBtn = document.getElementById('paths-toggle');

    function syncPathsButtonUI() {
      const isMidnight = (window.PATHS_MODE === 'midnight');
      pathsBtn.classList.toggle('active', isMidnight);
      pathsBtn.setAttribute('aria-pressed', String(isMidnight));
      pathsBtn.textContent = isMidnight ? '⚡ LIVE slóðir' : '🕛 Frá miðnætti';
    }

    // set initial UI from current mode
    window.PATHS_MODE = window.PATHS_MODE || 'live';
    syncPathsButtonUI();

    pathsBtn.addEventListener('click', () => {
      window.PATHS_MODE = (window.PATHS_MODE === 'midnight') ? 'live' : 'midnight';
      syncPathsButtonUI();

      if (typeof window.updateLivePaths === 'function') {
        window.updateLivePaths();
      }
    });
  </script>

  <script>
    (function () {
      const btn = document.getElementById("sidebar-toggle");
      if (!btn) return;

      btn.addEventListener("click", () => {
        document.body.classList.toggle("sidebar-open");
      });
    })();
  </script>

  <script>
    // Stats should be fetched via nginx (same-origin), NOT directly from port 5000.
    async function updateStats() {
      try {
        const res = await fetch("/stats", { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        document.getElementById("stat-total").textContent =
          (data.total || 0).toLocaleString("is-IS");

        document.getElementById("stat-week").textContent =
          (data.week || 0).toLocaleString("is-IS");

        document.getElementById("stat-today").textContent =
          (data.today || 0).toLocaleString("is-IS");

        document.getElementById("stat-hour").textContent =
          (data.hour || 0).toLocaleString("is-IS");

        const lastEl = document.getElementById("stat-last");
        if (lastEl) {
          if (data.last_flight_at) {
            const d = new Date(data.last_flight_at);
            lastEl.textContent = Number.isNaN(d.getTime())
              ? "–"
              : d.toLocaleString("is-IS", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
          } else {
            lastEl.textContent = "–";
          }
        }
      } catch (err) {
        console.error("Failed to load stats:", err);
      }
    }

    updateStats();
    setInterval(updateStats, 30000);
  </script>

</body>

</html>
